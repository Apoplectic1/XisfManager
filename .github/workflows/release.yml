name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_TAG#v}" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_REF_TAG: ${{ github.ref_name }}

      - name: Publish
        run: dotnet publish XisfFileManager/XisfFileManager.csproj -c Release --self-contained -r win-x64 -o ./publish

      - name: Install vpk
        run: dotnet tool install -g vpk

      - name: Package with Velopack
        run: vpk pack --packId XisfFileManager --packVersion ${{ steps.version.outputs.VERSION }} --packDir ./publish --mainExe XisfFileManager.exe --icon XisfFileManager/XisfFileManager.ico

      - name: Upload to GitHub Release
        run: vpk upload github --repoUrl https://github.com/${{ github.repository }} --tag ${{ github.ref_name }} --token ${{ secrets.GITHUB_TOKEN }} --publish
